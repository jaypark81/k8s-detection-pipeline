---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: alerter
  namespace: hitchhiker
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: alerter
              image: alerter:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: ELASTICSEARCH_URL
                  value: "https://siem-es-http.elastic-system.svc:9200"
                - name: ES_USER
                  value: "elastic"
                - name: ES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: siem-es-elastic-user
                      key: elastic
          restartPolicy: OnFailure
