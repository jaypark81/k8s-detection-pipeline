filter {
  if [source_type] == "tetragon" {

    mutate {
      add_field => {
        "[@metadata][target_index]" => "siem-tetragon"
      }
    }

    # ── ECS Event fields ──────────────────────────────────────────────────────
    mutate {
      add_field => {
        "[event][kind]"    => "event"
        "[event][module]"  => "tetragon"
        "[event][dataset]" => "tetragon.process"
      }
    }

    # Map Tetragon event type to ECS event.category + event.type
    if [log_parsed][process_exec] {
      mutate {
        add_field => {
          "[event][category]" => "process"
          "[event][type]"     => "start"
          "[event][action]"   => "process_exec"
        }
      }
    } else if [log_parsed][process_exit] {
      mutate {
        add_field => {
          "[event][category]" => "process"
          "[event][type]"     => "end"
          "[event][action]"   => "process_exit"
        }
      }
    } else if [log_parsed][process_kprobe] {
      mutate {
        add_field => {
          "[event][category]" => "process"
          "[event][type]"     => "info"
          "[event][action]"   => "process_kprobe"
        }
      }
    } else if [log_parsed][process_tracepoint] {
      mutate {
        add_field => {
          "[event][category]" => "process"
          "[event][type]"     => "info"
          "[event][action]"   => "process_tracepoint"
        }
      }
    }

    # ── ECS Host fields ───────────────────────────────────────────────────────
    mutate {
      rename => {
        "[kubernetes][host]" => "[host][name]"
      }
    }

    # ── ECS Container fields ──────────────────────────────────────────────────
    mutate {
      rename => {
        "[kubernetes][container_name]"  => "[container][name]"
        "[kubernetes][container_image]" => "[container][image][name]"
        "[kubernetes][docker_id]"       => "[container][id]"
      }
    }

    # ── ECS Orchestrator fields ───────────────────────────────────────────────
    mutate {
      rename => {
        "[cluster_name]"               => "[orchestrator][cluster][name]"
        "[kubernetes][namespace_name]" => "[orchestrator][namespace]"
        "[kubernetes][pod_name]"       => "[orchestrator][resource][name]"
        "[kubernetes][pod_ip]"         => "[orchestrator][resource][ip]"
      }
      add_field => {
        "[orchestrator][type]" => "kubernetes"
      }
    }

    # ── ECS Process fields (from process_exec/exit) ───────────────────────────
    if [log_parsed][process_exec][process] {
      mutate {
        rename => {
          "[log_parsed][process_exec][process][binary]"       => "[process][executable]"
          "[log_parsed][process_exec][process][arguments]"    => "[process][args]"
          "[log_parsed][process_exec][process][pid]"          => "[process][pid]"
          "[log_parsed][process_exec][process][start_time]"   => "[process][start]"
          "[log_parsed][process_exec][process][uid]"          => "[process][user][id]"
          "[log_parsed][process_exec][process][cwd]"          => "[process][working_directory]"
        }
      }
      # Parent process
      mutate {
        rename => {
          "[log_parsed][process_exec][process][parent_exec_id]" => "[process][parent][entity_id]"
        }
      }
    }

    # ── ECS Log fields ────────────────────────────────────────────────────────
    mutate {
      rename => {
        "[stream]" => "[log][iostream]"
      }
    }


    # ── Security context annotations → kubernetes.security.* ─────────────────
    if [kubernetes][annotations] {
      mutate {
        rename => {
          "[kubernetes][annotations][security.k8s.io/privileged]"                 => "[kubernetes][security][privileged]"
          "[kubernetes][annotations][security.k8s.io/host-pid]"                   => "[kubernetes][security][host_pid]"
          "[kubernetes][annotations][security.k8s.io/host-network]"               => "[kubernetes][security][host_network]"
          "[kubernetes][annotations][security.k8s.io/host-ipc]"                   => "[kubernetes][security][host_ipc]"
          "[kubernetes][annotations][security.k8s.io/host-path-sensitive]"        => "[kubernetes][security][host_path_sensitive]"
          "[kubernetes][annotations][security.k8s.io/host-path-mounts]"           => "[kubernetes][security][host_path_mounts]"
          "[kubernetes][annotations][security.k8s.io/capabilities-added]"         => "[kubernetes][security][capabilities_added]"
          "[kubernetes][annotations][security.k8s.io/allow-privilege-escalation]" => "[kubernetes][security][allow_privilege_escalation]"
          "[kubernetes][annotations][security.k8s.io/run-as-non-root]"            => "[kubernetes][security][run_as_non_root]"
          "[kubernetes][annotations][security.k8s.io/automount-sa-token]"         => "[kubernetes][security][automount_sa_token]"
          "[kubernetes][annotations][security.k8s.io/network-policy-applied]"     => "[kubernetes][security][network_policy_applied]"
          "[kubernetes][annotations][security.k8s.io/service-account]"            => "[kubernetes][security][service_account]"
        }
      }
    }
    # ── Cleanup ───────────────────────────────────────────────────────────────
    mutate {
      remove_field => [
        "log",
        "logtag",
        "source_type",
        "[log_parsed]"
      ]
    }
  }
}
