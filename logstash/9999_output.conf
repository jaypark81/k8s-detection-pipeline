output {
  # ── kubernetes logs → Data Stream ─────────────────────────────────────────
  if [event][module] == "kubernetes" {
    elasticsearch {
      hosts => [
        .......
      ]
      ssl_enabled => true
      sniffing => true
      user => "${ES_USER}"
      ssl_certificate_authorities => "${ES_CA_CERT}"
      password => "${ES_PASSWORD}"
      ssl_verification_mode => "none"
      data_stream => true
      data_stream_type => "logs"
      data_stream_dataset => "kubernetes"
      data_stream_namespace => "siem"
      action => "create"
    }
  # ── falco alerts → Data Stream ─────────────────────────────────────────────
  } else if [event][module] == "falco" {
    elasticsearch {
      hosts => [
        .......
      ]
      ssl_enabled => true
      sniffing => true
      user => "${ES_USER}"
      ssl_certificate_authorities => "${ES_CA_CERT}"
      password => "${ES_PASSWORD}"
      ssl_verification_mode => "none"
      data_stream => true
      data_stream_type => "logs"
      data_stream_dataset => "falco"
      data_stream_namespace => "siem"
      action => "create"
    }
  # ── tetragon events → Data Stream ──────────────────────────────────────────
  } else if [event][module] == "tetragon" {
    elasticsearch {
      hosts => [
        ....
      ]
      ssl_enabled => true
      sniffing => true
      user => "${ES_USER}"
      ssl_certificate_authorities => "${ES_CA_CERT}"
      password => "${ES_PASSWORD}"
      ssl_verification_mode => "none"
      data_stream => true
      data_stream_type => "logs"
      data_stream_dataset => "tetragon"
      data_stream_namespace => "siem"
      action => "create"
    }
  # ── Existing pipelines → regular indices (unchanged) ──────────────────────
  } else {
    elasticsearch {
      hosts => [
        ....
      ]
      ssl_enabled => true
      sniffing => true
      index => "%{[@metadata][target_index]}"
      user => "${ES_USER}"
      ssl_certificate_authorities => "${ES_CA_CERT}"
      password => "${ES_PASSWORD}"
      ssl_verification_mode => "none"
      action => "create"
    }
  }
}
