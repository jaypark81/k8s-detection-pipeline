filter {
  if [source_type] == "k8s-audit" {

    mutate {
      add_field => { "[@metadata][target_index]" => "siem-k8s-audit" }
    }

    # ── ECS Event fields ──────────────────────────────────────────────────────
    mutate {
      add_field => {
        "[event][kind]"    => "event"
        "[event][module]"  => "kubernetes"
        "[event][dataset]" => "kubernetes.audit"
      }
    }

    # verb → event.action
    mutate {
      rename => { "verb" => "[event][action]" }
    }

    # responseStatus.code → event.outcome
    if [responseStatus][code] {
      if [responseStatus][code] >= 200 and [responseStatus][code] < 300 {
        mutate { add_field => { "[event][outcome]" => "success" } }
      } else if [responseStatus][code] >= 400 {
        mutate { add_field => { "[event][outcome]" => "failure" } }
      } else {
        mutate { add_field => { "[event][outcome]" => "unknown" } }
      }
    }

    # ── ECS User fields ───────────────────────────────────────────────────────
    mutate {
      rename => {
        "[user][username]" => "[user][name]"
        "[user][uid]"      => "[user][id]"
        "[user][groups]"   => "[user][roles]"
      }
    }

    # ── ECS Source fields ─────────────────────────────────────────────────────
    mutate {
      rename => { "sourceIPs" => "[source][ip]" }
    }

    # ── ECS URL fields ────────────────────────────────────────────────────────
    mutate {
      rename => { "requestURI" => "[url][path]" }
    }

    # ── kubernetes.audit.* ────────────────────────────────────────────────────
    mutate {
      rename => {
        "[objectRef][resource]"    => "[kubernetes][audit][objectRef][resource]"
        "[objectRef][subresource]" => "[kubernetes][audit][objectRef][subresource]"
        "[objectRef][namespace]"   => "[kubernetes][audit][objectRef][namespace]"
        "[objectRef][name]"        => "[kubernetes][audit][objectRef][name]"
        "[objectRef][apiVersion]"  => "[kubernetes][audit][objectRef][apiVersion]"
        "[responseStatus][code]"   => "[kubernetes][audit][responseStatus][code]"
        "stage"                    => "[kubernetes][audit][stage]"
        "level"                    => "[kubernetes][audit][level]"
        "auditID"                  => "[kubernetes][audit][auditID]"
      }
    }

    # ── Authorization annotations ─────────────────────────────────────────────
    if [annotations] {
      mutate {
        rename => {
          "[annotations][authorization.k8s.io/decision]" => "[kubernetes][audit][authorization][decision]"
          "[annotations][authorization.k8s.io/reason]"   => "[kubernetes][audit][authorization][reason]"
        }
      }
    }

    # ── Timestamp ─────────────────────────────────────────────────────────────
    if [requestReceivedTimestamp] {
      date {
        match    => ["requestReceivedTimestamp", "ISO8601"]
        target   => "@timestamp"
        timezone => "UTC"
      }
    }

    # ── Exec command extraction ───────────────────────────────────────────────────
    if [kubernetes][audit][objectRef][subresource] == "exec" {
        ruby {
            code => '
            require "uri"
            path = event.get("[url][path]") || ""
            query = path.split("?", 2)[1] || ""
            commands = URI.decode_www_form(query)
                        .select { |k, _| k == "command" }
                        .map    { |_, v| v }
            unless commands.empty?
                event.set("[process][args]", commands)
                event.set("[process][command_line]", commands.join(" "))
            end
            '
        }
    }

    # ── Cleanup ───────────────────────────────────────────────────────────────
    mutate {
      remove_field => [
        "source_type",
        "requestReceivedTimestamp",
        "stageTimestamp",
        "annotations",
        "objectRef",
        "responseStatus",
        "kind",
        "apiVersion",
        "userAgent"
      ]
    }
  }
}
