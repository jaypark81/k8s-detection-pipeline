                event.set("[hitchhiker][error]", e.message)
              end
            '
          }
        }

        # Cleanup
        mutate {
          remove_field => ["logtag", "source_type", "[log_parsed]"]
        }
      }
    }

  9999_output.conf: |
    output {
      if [event][module] == "falco" {
        elasticsearch {
          hosts => ["https://siem-es-http.elastic-system.svc:9200"]
          ssl_enabled => true
          ssl_verification_mode => "none"
          user => "${ES_USER}"
          password => "${ES_PASSWORD}"
          data_stream => true
          data_stream_type => "logs"
          data_stream_dataset => "falco"
          data_stream_namespace => "siem"
          action => "create"
        }
      } else if [event][module] == "tetragon" {
        elasticsearch {
          hosts => ["https://siem-es-http.elastic-system.svc:9200"]
          ssl_enabled => true
          ssl_verification_mode => "none"
          user => "${ES_USER}"
          password => "${ES_PASSWORD}"
          data_stream => true
          data_stream_type => "logs"
          data_stream_dataset => "tetragon"
          data_stream_namespace => "siem"
          action => "create"
        }
      } else if [event][module] == "kyverno" {
        elasticsearch {
          hosts => ["https://siem-es-http.elastic-system.svc:9200"]
          ssl_enabled => true
          ssl_verification_mode => "none"
          user => "${ES_USER}"
          password => "${ES_PASSWORD}"
          data_stream => true
          data_stream_type => "logs"
          data_stream_dataset => "kyverno"
          data_stream_namespace => "siem"
          action => "create"
        }
      } else {
        elasticsearch {
          hosts => ["https://siem-es-http.elastic-system.svc:9200"]
          ssl_enabled => true
          ssl_verification_mode => "none"
          user => "${ES_USER}"
          password => "${ES_PASSWORD}"
          data_stream => true
          data_stream_type => "logs"
          data_stream_dataset => "kubernetes"
          data_stream_namespace => "siem"
          action => "create"
        }
      }
    }
