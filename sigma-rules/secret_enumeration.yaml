title: Kubernetes Secret Enumeration
status: experimental
description: |
  A user or service account is listing or getting secrets.
  May indicate credential harvesting after initial access.
author: jaypark81
date: 2026-04-04
logsource:
  product: kubernete
  service: audit
detection:
  selection:
    verb:
      - get
      - list
    objectRef.resource: secrets
    responseStatus.code: 200
  filter_system:
    user.username|startswith:
      - 'system:node'
      - 'system:kube-controller'
  condition: selection and not filter_system
falsepositive:
  - Legitimate access by Vault agent, cert-manager, or similar controllers
level: medium
tags:
  - attack.credential_access
  - attack.t1552.007
