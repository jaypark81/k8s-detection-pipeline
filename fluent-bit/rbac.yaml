# fluent-bit/rbac.yaml
# RBAC for Fluent Bit DaemonSet
# Required for the kubernetes filter to enrich logs with pod metadata

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: k8s-detection-pipeline
  annotations:
    # IAM role must have MSK publish permissions
    # Replace with your IAM role ARN
    eks.amazonaws.com/role-arn: ${FLUENT_BIT_IAM_ROLE_ARN}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: k8s-detection-pipeline
rules:
  # Required for kubernetes metadata filter
  # Allows Fluent Bit to look up pod/namespace info by name
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]

  # Required to read pod labels/annotations for enrichment
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: k8s-detection-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: kube-system
