# fluent-bit/daemonset.yaml
# Fluent Bit DaemonSet for K8S-DETECTION-PIPELINE
# Runs on every node to collect container logs
# Uses IRSA (IAM Role for Service Accounts) for MSK IAM auth
# ServiceAccount is defined in rbac.yaml

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: k8s-detection-pipeline
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: k8s-detection-pipeline
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        # Run on all nodes including control plane
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      containers:
        - name: fluent-bit
          # Use the image that includes Kafka plugin (fluent-bit with rdkafka)
          image: fluent/fluent-bit:3.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 2020
              protocol: TCP

          # Liveness probe via built-in HTTP server
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30

          env:
            # EKS cluster name — tag applied to every log event for multi-cluster correlation
            - name: CLUSTER_NAME
              value: "REPLACE_WITH_CLUSTER_NAME"

            # MSK bootstrap brokers (comma-separated, port 9098 for IAM auth)
            - name: KAFKA_BROKERS
              value: "REPLACE_WITH_MSK_BROKERS" 

            # Kafka topic names
            - name: KAFKA_TOPIC_FALCO
              value: "siem-falco"

            - name: KAFKA_TOPIC_TETRAGON
              value: "siem-tetragon"

            - name: KAFKA_TOPIC_K8S
              value: "siem-k8s"

            # Node name for metadata
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
