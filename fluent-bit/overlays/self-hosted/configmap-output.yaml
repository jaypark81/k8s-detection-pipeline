apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config-output
  namespace: kube-system
data:
  outputs.conf: |
    [OUTPUT]
        Name             kafka
        Match            falco.*
        Brokers          ${KAFKA_BROKERS}
        Topics           siem-falco
        Timestamp_Key    @timestamp
        Timestamp_Format iso8601
        Retry_Limit      3

    [OUTPUT]
        Name             kafka
        Match            tetragon.*
        Brokers          ${KAFKA_BROKERS}
        Topics           siem-tetragon
        Timestamp_Key    @timestamp
        Timestamp_Format iso8601
        Retry_Limit      3

    [OUTPUT]
        Name             kafka
        Match            kyverno.*
        Brokers          ${KAFKA_BROKERS}
        Topics           siem-kyverno
        Timestamp_Key    @timestamp
        Timestamp_Format iso8601
        Retry_Limit      3

    [OUTPUT]
        Name             kafka
        Match            k8s.*
        Brokers          ${KAFKA_BROKERS}
        Topics           siem-k8s
        Timestamp_Key    @timestamp
        Timestamp_Format iso8601
        Retry_Limit      3

    [OUTPUT]
        Name             kafka
        Match            k8s-audit.*
        Brokers          ${KAFKA_BROKERS}
        Topics           siem-k8s-audit
        Timestamp_Key    @timestamp
        Timestamp_Format iso8601
        Retry_Limit      3
