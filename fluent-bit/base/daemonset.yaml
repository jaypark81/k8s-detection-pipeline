apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: k8s-detection-pipeline
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: k8s-detection-pipeline
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 2020
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: CLUSTER_NAME
              value: "default"
            - name: KAFKA_BROKERS
              value: "siem-kafka-bootstrap.kafka.svc:9092"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config-common
              mountPath: /fluent-bit/etc/
            - name: config-output
              mountPath: /fluent-bit/etc/outputs/
            - name: varlog
              mountPath: /var/log
              readOnly: false
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlog-kubernetes
              mountPath: /var/log/kubernetes
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config-common
          configMap:
            name: fluent-bit-config-common
        - name: config-output
          configMap:
            name: fluent-bit-config-output
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlog-kubernetes
          hostPath:
            path: /var/log/kubernetes
