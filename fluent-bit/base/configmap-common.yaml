apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config-common
  namespace: kube-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    @INCLUDE inputs.conf
    @INCLUDE filters.conf
    @INCLUDE /fluent-bit/etc/outputs/outputs.conf

  inputs.conf: |
    # Falco alerts (JSON from stdout)
    [INPUT]
        Name              tail
        Tag               falco.*
        Path              /var/log/containers/falco-*.log
        Parser            cri
        DB                /var/log/flb_falco.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # Tetragon events (JSON from stdout)
    [INPUT]
        Name              tail
        Tag               tetragon.*
        Path              /var/log/containers/tetragon-*.log
        Parser            cri
        DB                /var/log/flb_tetragon.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # Kyverno policy events
    [INPUT]
        Name              tail
        Tag               kyverno.*
        Path              /var/log/containers/kyverno-*.log
        Parser            cri
        DB                /var/log/flb_kyverno.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # K8s workload logs (excluding system namespaces)
    [INPUT]
        Name              tail
        Tag               k8s.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/falco-*.log,/var/log/containers/tetragon-*.log,/var/log/containers/kyverno-*.log
        Parser            cri
        DB                /var/log/flb_k8s.db
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # K8s API server audit logs (control plane only)
    [INPUT]
        Name              tail
        Tag               k8s-audit.*
        Path              /var/log/kubernetes/audit*.log
        Parser            json
        DB                /var/log/flb_k8s_audit.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

  filters.conf: |
    # Enrich Falco logs with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               falco.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     falco.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        Labels              On
        Annotations         Off

    # Enrich Tetragon logs with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               tetragon.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     tetragon.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        Labels              On
        Annotations         Off

    # Enrich Kyverno logs with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               kyverno.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kyverno.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        Labels              On
        Annotations         Off

    # Enrich K8s workload logs with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               k8s.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     k8s.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        Labels              On
        Annotations         Off

    # Add cluster name and source type to all records
    [FILTER]
        Name    record_modifier
        Match   falco.*
        Record  cluster_name ${CLUSTER_NAME}
        Record  source_type  falco

    [FILTER]
        Name    record_modifier
        Match   tetragon.*
        Record  cluster_name ${CLUSTER_NAME}
        Record  source_type  tetragon

    [FILTER]
        Name    record_modifier
        Match   kyverno.*
        Record  cluster_name ${CLUSTER_NAME}
        Record  source_type  kyverno

    [FILTER]
        Name    record_modifier
        Match   k8s.*
        Record  cluster_name ${CLUSTER_NAME}
        Record  source_type  k8s

    [FILTER]
        Name    record_modifier
        Match   k8s-audit.*
        Record  cluster_name ${CLUSTER_NAME}
        Record  source_type  k8s-audit

  parsers.conf: |
    # CRI log format parser (containerd)
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    # JSON parser for pre-formatted logs
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
